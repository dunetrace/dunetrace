# DuneTrace — Postgres + Ingest + Detector + Alerts + Customer API
# Usage: docker compose up -d
# Ingest API:   http://localhost:8001
# Customer API: http://localhost:8002  (docs at /docs)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dunetrace
      POSTGRES_PASSWORD: dunetrace
      POSTGRES_DB: dunetrace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dunetrace -d dunetrace"]
      interval: 3s
      timeout: 5s
      retries: 5

  ingest:
    build:
      context: .
      dockerfile: services/ingest/Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "ingest_svc.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      DATABASE_URL: postgresql://dunetrace:dunetrace@postgres:5432/dunetrace
      ENV: dev
      AUTH_MODE: dev
      PYTHONPATH: /app/services/ingest
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  detector:
    build:
      context: .
      dockerfile: services/detector/Dockerfile
    restart: unless-stopped
    volumes:
      - ./detectors.yml:/app/detectors.yml:ro
    environment:
      DATABASE_URL: postgresql://dunetrace:dunetrace@postgres:5432/dunetrace
      POLL_INTERVAL: 5
      STALL_TIMEOUT_SECS: 60
      PYTHONPATH: /app/packages/sdk-py:/app/services/detector
    depends_on:
      postgres:
        condition: service_healthy
      ingest:
        condition: service_started
    command: ["python", "-m", "detector_svc.worker"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncpg\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  alerts:
    build:
      context: .
      dockerfile: services/alerts/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dunetrace:dunetrace@postgres:5432/dunetrace
      POLL_INTERVAL: 10
      PYTHONPATH: /app/packages/sdk-py:/app/services/explainer:/app/services/alerts
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      detector:
        condition: service_started
    command: ["python", "-m", "alerts_svc.worker"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import asyncpg\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8002:8002"
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dunetrace:dunetrace@postgres:5432/dunetrace
      AUTH_MODE: dev
      PYTHONPATH: /app/packages/sdk-py:/app/services/explainer:/app/services/api
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "api_svc.main:app", "--host", "0.0.0.0", "--port", "8002"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    restart: unless-stopped
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
